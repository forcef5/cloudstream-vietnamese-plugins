name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 17

      - name: Setup Gradle 8.9
        run: |
          GRADLE_VERSION=8.9
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          sudo unzip -qo /tmp/gradle.zip -d /opt/
          sudo ln -sf "/opt/gradle-${GRADLE_VERSION}/bin/gradle" /usr/local/bin/gradle
          gradle --version

      - name: Build plugins
        run: |
          gradle ThuVienHDProvider:make ThuVienCineProvider:make GoogleSheetProvider:make --no-daemon --stacktrace
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Move built files
        run: |
          mkdir -p builds
          find . -name "*.cs3" -exec cp {} builds/ \;
          echo "Built files:"
          ls -la builds/

      - name: Push builds to builds branch
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # Save built files
          cp -r builds /tmp/builds

          # Create orphan builds branch
          git checkout --orphan builds
          git rm -rf .

          # Copy built files back
          cp /tmp/builds/*.cs3 . 2>/dev/null || true

          # Add and commit
          git add *.cs3 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Build: Update plugins"
          git push -f origin builds || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: builds/*.cs3
          retention-days: 30
