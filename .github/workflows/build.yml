name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugins
        run: |
          ./gradlew ThuVienHDProvider:make ThuVienCineProvider:make GoogleSheetProvider:make
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Move built files
        run: |
          # Create builds directory
          mkdir -p builds

          # Find and copy .cs3 files
          find . -name "*.cs3" -exec cp {} builds/ \;

          echo "Built files:"
          ls -la builds/

      - name: Push builds to repo
        run: |
          # Configure git
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # Copy builds to root
          cp builds/*.cs3 . 2>/dev/null || true

          # Generate plugins.json from built files
          # (The plugins.json is already in the repo, just update URLs)

          # Add and commit
          git add *.cs3 plugins.json
          git diff --staged --quiet || git commit -m "Build: Update plugins [skip ci]"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: builds/*.cs3
          retention-days: 30
