name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          # Download and install Gradle to generate the wrapper
          GRADLE_VERSION=8.9
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/
          /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          chmod +x gradlew

      - name: Build plugins
        run: |
          ./gradlew ThuVienHDProvider:make ThuVienCineProvider:make GoogleSheetProvider:make
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Move built files
        run: |
          mkdir -p builds
          find . -name "*.cs3" -exec cp {} builds/ \;
          echo "Built files:"
          ls -la builds/

      - name: Push builds to builds branch
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # Create orphan builds branch
          git checkout --orphan builds
          git rm -rf .

          # Copy built files
          cp builds/*.cs3 . 2>/dev/null || true

          # Add and commit
          git add *.cs3
          git diff --staged --quiet || git commit -m "Build: Update plugins"
          git push -f origin builds

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: builds/*.cs3
          retention-days: 30
